<div class="chat-console-wrapper" style="display: flex; height: calc(100vh - 140px); background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md);">
  
  <!-- LEFT COLUMN: THREADS LIST -->
  <div class="chat-threads-col" style="width: 350px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: #ffffff; flex-shrink: 0;">
    <!-- Column Header: Session selector & Search -->
    <div style="padding: 1.25rem; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 0.75rem;">
      <div class="form-group" style="margin-bottom: 0;">
        <label for="chat-session-select" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); text-align: left; display: block;">Akun Pengirim (Session)</label>
        <select id="chat-session-select" style="width: 100%; margin-top: 0.25rem;">
          <option value="default">Sesi default</option>
        </select>
      </div>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <div style="position: relative; flex: 1;">
          <input type="text" id="chat-search-input" placeholder="Cari kontak atau nomor..." style="width: 100%; padding-left: 2.25rem; font-size: 0.8rem;">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
        <button id="btn-new-chat-trigger" title="Mulai Chat Baru" style="width: 38px; height: 38px; padding: 0; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; background-color: var(--primary-light); color: var(--primary); transition: var(--transition); border: 1px dashed var(--primary); flex-shrink: 0;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
    </div>

    <!-- Scrollable Threads List -->
    <div id="chat-threads-list" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column;">
      <!-- Loaded dynamically -->
      <div style="padding: 3rem 1rem; text-align: center; color: var(--text-muted);">
        <div class="spinner" style="margin: 0 auto; width: 20px; height: 20px;"></div>
        <p style="font-size: 0.8rem; margin-top: 0.5rem;">Memuat daftar percakapan...</p>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN: CHAT WINDOW -->
  <div class="chat-window-col" style="flex: 1; display: flex; flex-direction: column; background-color: var(--bg-slate); position: relative;">
    
    <!-- Active Room Header -->
    <div id="chat-active-header" style="height: 65px; border-bottom: 1px solid var(--border-color); background: #ffffff; padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; z-index: 10;">
      <!-- Default state: No contact selected -->
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: 700;">?</div>
        <div style="text-align: left;">
          <div style="font-weight: 700; color: var(--text-title); font-size: 0.9rem;">Pilih Percakapan</div>
          <div style="font-size: 0.75rem; color: var(--text-muted);">Pilih nomor di sebelah kiri untuk melihat pesan</div>
        </div>
      </div>
    </div>

    <!-- Scrollable Messages Feed -->
    <div id="chat-messages-feed" style="flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
      <div style="margin: auto; text-align: center; max-width: 320px; padding: 2rem; color: var(--text-muted);">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" style="color: #cbd5e1; margin-bottom: 0.75rem; display: inline-block;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <h4 style="font-weight: 700; color: var(--text-title); font-size: 0.95rem; margin-bottom: 0.25rem;">Live Chat Console</h4>
        <p style="font-size: 0.8rem; line-height: 1.4;">Pilih salah satu nomor WhatsApp di sebelah kiri untuk membalas secara real-time dan melihat histori chat.</p>
      </div>
    </div>

    <!-- Floating typing/status indicator -->
    <div id="chat-typing-status" style="position: absolute; bottom: 75px; left: 1.5rem; font-size: 0.75rem; color: var(--primary); font-weight: 600; display: none; background: rgba(239, 246, 255, 0.9); padding: 0.25rem 0.6rem; border-radius: 4px; border: 1px solid #bfdbfe; box-shadow: var(--shadow-sm); z-index: 5;">
      Sistem sedang mensimulasikan mengetik...
    </div>

    <!-- Message Input Bar (Only visible when contact selected) -->
    <div id="chat-input-container" style="background: #ffffff; border-top: 1px solid var(--border-color); padding: 1rem 1.5rem; display: none; align-items: center; gap: 0.75rem; z-index: 10;">
      <textarea id="chat-message-textarea" rows="1" placeholder="Tulis pesan balasan ke nomor ini..." style="flex: 1; resize: none; font-size: 0.85rem; padding: 0.65rem 0.85rem; min-height: 40px; max-height: 120px; border-radius: 20px; background-color: var(--bg-slate); border: 1px solid var(--border-color); outline: none;"></textarea>
      
      <button id="btn-chat-send" style="width: 40px; height: 40px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background-color: var(--primary); transition: var(--transition);">
        <svg width="18" height="18" fill="white" viewBox="0 0 24 24" style="transform: rotate(45deg); display: inline-block;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

  </div>
</div>
